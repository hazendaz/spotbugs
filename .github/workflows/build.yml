name: Build
on: [push, pull_request]

permissions:
  contents: read # to fetch code (actions/checkout)

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        java: [11, 17, 21, 23]
      fail-fast: false
      max-parallel: 6
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: gradle
      - uses: gradle/actions/wrapper-validation@v4
      - name: Download Eclipse
        uses: knicknic/os-specific-run@v1
        with:
          linux: |
            curl --location 'https://www.eclipse.org/downloads/download.php?file=/eclipse/downloads/drops4/R-4.24-202206070700/eclipse-SDK-4.24-linux-gtk-x86_64.tar.gz&mirror_id=1' --output eclipse-SDK-4.24-linux-gtk-x86_64.tar.gz
            tar --extract --gzip --file=eclipse-SDK-4.24-linux-gtk-x86_64.tar.gz eclipse
            echo "eclipseRoot.dir=$(pwd)/eclipse" | tee eclipsePlugin/local.properties
          windows: |
            curl --location 'https://www.eclipse.org/downloads/download.php?file=/eclipse/downloads/drops4/R-4.24-202206070700/eclipse-SDK-4.24-win32-x86_64.zip&mirror_id=1' --output eclipse-SDK-4.24-win32-x86_64.zip
            Expand-Archive "eclipse-SDK-4.24-win32-x86_64.zip" -DestinationPath "." -Force
            $escapedPwd = $pwd.Path -replace '\\', '\\'
            [System.IO.File]::WriteAllLines("$pwd\\eclipsePlugin\\local.properties", "eclipseRoot.dir=$escapedPwd\\eclipse")
          macos: |
            curl --location 'https://www.eclipse.org/downloads/download.php?file=/eclipse/downloads/drops4/R-4.24-202206070700/eclipse-SDK-4.24-macosx-cocoa-x86_64.dmg&mirror_id=1' --output eclipse-SDK-4.24-macosx-cocoa-x86_64.dmg
            hdiutil attach eclipse-SDK-4.24-macosx-cocoa-x86_64.dmg
            cp --recursive /Volumes/Eclipse/Eclipse.app /Applications/
            hdiutil detach /Volumes/Eclipse
            echo "eclipseRoot.dir=/Applications/Eclipse.app" | tee eclipsePlugin/local.properties
      - name: Set up Pre-build
        if: github.repository_owner == 'spotbugs'
        run: |
          echo "keystorepass=${KEYSTORE_PASS}" >> gradle.properties
          gpg --quiet --batch --yes --decrypt --passphrase="$GPG_SECRET_PASSPHRASE" --output spotbugs.jks .github/workflows/spotbugs.jks.gpg;
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          GPG_SECRET_PASSPHRASE: ${{ secrets.GPG_SECRET_PASSPHRASE }}
      - name: Build with Sonar JDK ${{ matrix.java }}, ${{ matrix.os }}
        # https://community.sonarsource.com/t/sonarcloud-now-not-updating-github-pr-and-checks/6595/17
        if: github.repository_owner == 'spotbugs' && matrix.java == '21'
        run: ./gradlew spotlessCheck build smoketest ${SONAR_LOGIN:+sonar} --no-daemon "-Dsonar.token=$SONAR_LOGIN" --scan
        env:
          SONAR_LOGIN: ${{ secrets.SONAR_LOGIN }}
      - name: Build JDK ${{ matrix.java }}, ${{ matrix.os }}
        if: github.repository_owner != 'spotbugs' || (github.repository_owner == 'spotbugs' && matrix.java != '21')
        run: ./gradlew spotlessCheck build smoketest --no-daemon --scan
